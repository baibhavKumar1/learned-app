name: guide
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  cloud_firestore: ^6.5.0
  cloud_functions: 6.3.2
  dotted_border: ^3.1.0
  file_picker: ^8.1.2
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_storage: ^13.4.3
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  flutter_speed_dial: ^7.0.0
  flutter_svg: ^2.3.0
  flutter_tutorial_overlay: ^1.0.5
  google_fonts: ^8.1.0
  google_sign_in: ^6.2.1
  http: ^1.6.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  tutorial_coach_mark: ^1.3.3
  url_launcher: ^6.3.2
  video_player: ^2.9.2
  youtube_explode_dart: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
  web:
    generate: false
  min_sdk_android: 21
